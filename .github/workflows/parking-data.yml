name: Refresh SF parking data

on:
  schedule:
    # Daily at 10:15 UTC (2:15/3:15 AM Pacific), after DataSF's nightly update
    - cron: "15 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      # Persist immutable month archives + address points between runs so the
      # daily job only refetches the 2-3 most recent (still-changing) months
      # instead of the full 12-month window.
      - name: Restore DataSF fetch cache
        uses: actions/cache@v4
        with:
          path: pipeline/cache
          key: datasf-cache-${{ github.run_id }}
          restore-keys: datasf-cache-

      - name: Expire stale address cache (monthly refresh)
        run: find pipeline/cache -name "addresses.jsonl.gz" -mtime +30 -delete 2>/dev/null || true

      - name: Run pipeline
        working-directory: pipeline
        env:
          # Optional: a free Socrata app token further raises rate limits.
          SODA_APP_TOKEN: ${{ secrets.SODA_APP_TOKEN }}
        run: python run_pipeline.py --months 12

      - name: Publish to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pipeline/output
          publish_branch: gh-pages
          force_orphan: true
